<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreatorFlow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .container { text-align: center; max-width: 480px; padding: 0 24px; }
        .logo { font-size: 2.4em; font-weight: 700; margin-bottom: 12px; }
        .logo span { background: linear-gradient(135deg, #25F4EE, #FE2C55); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tagline { color: #888; font-size: 1.1em; margin-bottom: 48px; line-height: 1.5; }
        .tiktok-btn { display: inline-flex; align-items: center; gap: 12px; background: #fff; color: #000; font-size: 1.05em; font-weight: 600; padding: 14px 32px; border-radius: 8px; text-decoration: none; transition: transform 0.15s, box-shadow 0.15s; }
        .tiktok-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(254,44,85,0.3); }
        .tiktok-btn svg { width: 24px; height: 24px; }
        .links { margin-top: 64px; display: flex; gap: 24px; }
        .links a { color: #555; font-size: 0.85em; text-decoration: none; }
        .links a:hover { color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><span>CreatorFlow</span></div>
        <p class="tagline">Smart content creation for short-form video creators.<br>Generate, publish, and grow — automatically.</p>
        <a class="tiktok-btn" id="loginBtn" href="#">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1v-3.5a6.37 6.37 0 00-.79-.05A6.34 6.34 0 003.15 15.2a6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.34-6.34V8.98a8.2 8.2 0 004.76 1.52V7.05a4.84 4.84 0 01-1-.36z"/></svg>
            Continue with TikTok
        </a>
        <div class="links">
            <a href="terms.html">Terms of Service</a>
            <a href="privacy.html">Privacy Policy</a>
        </div>
    </div>
    <script>
        const CLIENT_KEY = 'sbawsr4he8td3y3z3k';
        const REDIRECT_URI = encodeURIComponent('https://tristan1075.github.io/creatorflow-legal/callback.html');
        const SCOPE = 'user.info.basic,video.publish,video.upload';
        const STATE = Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b => b.toString(16).padStart(2, '0')).join('');
        const authUrl = `https://www.tiktok.com/v2/auth/authorize/?client_key=${CLIENT_KEY}&scope=${SCOPE}&response_type=code&redirect_uri=${REDIRECT_URI}&state=${STATE}`;
        document.getElementById('loginBtn').href = authUrl;
    </script>
</body>
</html>
