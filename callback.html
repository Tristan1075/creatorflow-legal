<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreatorFlow - Authorization</title>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 600px; margin: 100px auto; padding: 0 20px; color: #333; text-align: center; }
        .code { background: #f0f0f0; padding: 16px 24px; border-radius: 8px; font-family: monospace; font-size: 1.2em; word-break: break-all; margin: 20px 0; user-select: all; }
        .success { color: #0a0; }
        .error { color: #c00; }
        button { padding: 10px 24px; font-size: 1em; border: none; background: #0070f3; color: white; border-radius: 6px; cursor: pointer; }
        button:hover { background: #005bd4; }
    </style>
</head>
<body>
    <h1>CreatorFlow</h1>
    <div id="result"></div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const error = params.get('error');
        const el = document.getElementById('result');

        if (code) {
            el.innerHTML = `
                <p class="success">Authorization successful!</p>
                <p>Copy this code and paste it in your terminal:</p>
                <div class="code">${code}</div>
                <button onclick="navigator.clipboard.writeText('${code}')">Copy code</button>
            `;
        } else if (error) {
            el.innerHTML = `<p class="error">Authorization failed: ${error}</p>`;
        } else {
            el.innerHTML = `<p>No authorization code received.</p>`;
        }
    </script>
</body>
</html>
